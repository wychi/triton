name: Wheel Test
# Minimal workflow to validate that the manylinux wheel build works on a
# GitHub-hosted runner. No Azure publish, no version gating.
# Builds one CPython manylinux x86_64 wheel per matrix leg in parallel.
#
# Trigger via:
#   gh workflow run wheel-test.yml -R facebookexperimental/triton
# Or by editing this file in a PR.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/wheel-test.yml

permissions: read-all

jobs:
  build:
    name: Build wheel ${{ matrix.python }} x86_64
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    strategy:
      # Don't cancel sibling Python builds when one fails — we want to see
      # which ABIs work and which break.
      fail-fast: false
      matrix:
        python: [cp310, cp311, cp312, cp313, cp314]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build wheel via cibuildwheel
        run: |
          python3 -m pip install --upgrade cibuildwheel

          # MAX_JOBS=2 because GH-hosted runners only have ~16 GB RAM and
          # Triton's LLVM-link OOMs at higher parallelism.
          export CIBW_ENVIRONMENT="MAX_JOBS=2 TRITON_BUILD_WITH_CLANG_LLD=1"
          export CIBW_BEFORE_ALL="dnf install clang lld -y"
          export CIBW_MANYLINUX_X86_64_IMAGE="quay.io/pypa/manylinux_2_28_x86_64:latest"
          export CIBW_BUILD="${{ matrix.python }}-manylinux_x86_64"

          # Smoke-test: import the freshly-built wheel inside the per-ABI venv
          # cibuildwheel creates. CPU-only — GPU correctness is covered by
          # h100.yml / mi350.yml, which build from source on real hardware.
          export CIBW_TEST_COMMAND='python -c "import triton; print(\"OK\", triton.__version__)"'

          python3 -m cibuildwheel . --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-test-${{ matrix.python }}-manylinux_2_28_x86_64
          path: ./wheelhouse/*.whl
          if-no-files-found: error
