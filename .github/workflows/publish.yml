name: Publish to PyPI
# Builds fbtriton wheels (by reusing wheels.yml in release_mode) and publishes
# them to PyPI via Trusted Publishing (OIDC) — no API token in repo secrets.
#
# Trigger (formal, gated):
# - push of a tag matching:
#     v<MAJOR>.<MINOR>.<PATCH>             → release   (e.g. v3.6.0)
#     v<MAJOR>.<MINOR>.<PATCH>-rc<N>       → release candidate (e.g. v3.6.0-rc1)
#     v<MAJOR>.<MINOR>.<PATCH>.dev<N>      → dev/nightly (e.g. v3.6.0.dev20260515)
#
# No manual workflow_dispatch — publishing is intentionally tag-only so the
# released artifact is always tied to a specific git tag.
#
# PyPI side requires a configured Trusted Publisher for this repo:
#   project:     fbtriton
#   owner:       facebookexperimental
#   repo:        triton
#   workflow:    publish.yml
#   environment: pypi
# See: https://docs.pypi.org/trusted-publishers/

on:
  workflow_dispatch:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
      - v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+
      - v[0-9]+.[0-9]+.[0-9]+.dev[0-9]+

permissions: read-all

jobs:
  # Convert the git tag into a PEP 440-compliant version suffix that gets
  # appended to setup.py's base TRITON_VERSION via TRITON_WHEEL_VERSION_SUFFIX.
  #   v3.6.0            → ""           → 3.6.0
  #   v3.6.0-rc1        → "rc1"        → 3.6.0rc1     (PEP 440 drops the dash)
  #   v3.6.0.dev123     → ".dev123"    → 3.6.0.dev123
  prepare:
    name: Compute version suffix from tag
    runs-on: ubuntu-22.04
    outputs:
      version_suffix: ${{ steps.compute.outputs.version_suffix }}
    steps:
      - id: compute
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" =~ \.dev([0-9]+)$ ]]; then
            suffix=".dev${BASH_REMATCH[1]}"
          elif [[ "$tag" =~ -rc([0-9]+)$ ]]; then
            suffix="rc${BASH_REMATCH[1]}"
          else
            suffix=""
          fi
          echo "Tag: $tag → version_suffix='$suffix'"
          echo "version_suffix=$suffix" >> "$GITHUB_OUTPUT"

  build:
    name: Build wheels
    needs: prepare
    uses: ./.github/workflows/wheels.yml
    with:
      version_suffix: ${{ needs.prepare.outputs.version_suffix }}

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: pypi
      url: https://pypi.org/p/fbtriton
    permissions:
      # Required for Trusted Publishing (OIDC).
      id-token: write

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: false
          print-hash: true
